  <!-- ── ui-nav.html ──────────────────────────────────────────────────────────
       Desktop tab navigation bar. Each tab div calls showTab(name) on click.
       Tab visibility (tab-overrides, tab-filters) is controlled by CFG in
       loadAll() — the overrides tab is hidden when overrides are disabled.
       Included by ui.html. ── -->
  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="instances" onclick="showTab('instances')">Instances</div>
    <div class="tab tab-overrides" id="tab-btn-overrides" data-tab="overrides" onclick="showTab('overrides')">⊙ Overrides</div>
    <div class="tab" data-tab="settings" onclick="showTab('settings')">Settings</div>
    <div class="tab tab-filters" id="tab-btn-filters" data-tab="filters" onclick="showTab('filters')">Filters</div>
    <div class="tab" data-tab="sweep" onclick="showTab('sweep')">Sweep</div>
    <div class="tab" data-tab="history" onclick="showTab('history')">History</div>
    <div class="tab" data-tab="imports" onclick="showTab('imports')">Imports</div>
    <div class="tab" data-tab="intel" onclick="showTab('intel')">Intel</div>
    <div class="tab" data-tab="notifications" onclick="showTab('notifications')">Notifications</div>
    <div class="tab" data-tab="advanced" onclick="showTab('advanced')">Advanced</div>
  </div>
