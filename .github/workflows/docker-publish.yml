name: Build and Publish (GHCR + Docker Hub)

on:
  push:
    branches: ["main", "nightly", "dev"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          GHCR="ghcr.io/mmagtech/nudgarr"
          HUB="${{ secrets.DOCKERHUB_USERNAME }}/nudgarr"
          REF="${GITHUB_REF}"
          REF_NAME="${GITHUB_REF_NAME}"
          TAGS=""
          if [[ "${REF}" == refs/heads/main ]]; then
            TAGS="${GHCR}:latest,${HUB}:latest"
          fi
          if [[ "${REF}" == refs/heads/nightly ]]; then
            TAGS="${GHCR}:nightly,${HUB}:nightly"
          fi
          if [[ "${REF}" == refs/heads/dev ]]; then
            TAGS="${GHCR}:dev,${HUB}:dev"
          fi
          if [[ "${REF}" == refs/tags/v* ]]; then
            V="${REF_NAME#v}"
            MAJOR="${V%%.*}"
            REST="${V#*.}"
            MINOR="${REST%%.*}"
            TAGS="${GHCR}:${REF_NAME},${GHCR}:${V},${GHCR}:${MAJOR}.${MINOR},${HUB}:${REF_NAME},${HUB}:${V},${HUB}:${MAJOR}.${MINOR}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.prep.outputs.tags }}
