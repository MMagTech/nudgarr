<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Nudgarr — Login</title>
  <style>
    :root {
      --bg: #11131f; --surface: #181a28; --card: #1e2030;
      --border: rgba(255,255,255,.10); --border-focus: rgba(99,120,255,.6);
      --muted: #7c8494; --text: #e8eaf0; --text-dim: #a0a8b8;
      --accent-dim: rgba(99,120,255,.15); --accent-border: rgba(99,120,255,.35);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--text); font-size: 14px;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 32px;
      width: 100%; max-width: 360px; box-shadow: 0 24px 64px rgba(0,0,0,.5);
      animation: fadeUp .22s ease forwards;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    h1 { font-size: 18px; font-weight: 800; margin: 0 0 2px; letter-spacing: -.4px; color: #e8eaf0; }
    h1 span { font-style: italic; letter-spacing: .03em; }
    .sub { color: var(--muted); font-size: 12px; margin: 0 0 24px; }
    label { font-size: 12px; color: #bcc4dc; font-weight: 500; display: block; margin-bottom: 5px; }
    input {
      width: 100%; padding: 9px 11px; border-radius: 9px;
      border: 1px solid rgba(255,255,255,.11); background: #13152b; color: var(--text);
      font-size: 13px; outline: none; margin-bottom: 14px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.4), inset 0 0 0 1px rgba(0,0,0,.2);
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--border-focus); box-shadow: inset 0 1px 3px rgba(0,0,0,.4), 0 0 0 2px rgba(99,120,255,.18); }
    button {
      width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--accent-border);
      background: var(--accent-dim); color: #a8b4ff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s, color .15s;
    }
    button:hover:not(:disabled) { background: rgba(99,120,255,.32); color: #c0caff; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .err {
      color: #fca5a5; font-size: 12px; margin-bottom: 14px; display: none;
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px; padding: 8px 10px;
    }
    .err.show { display: block; }
  </style>
</head>
<body>
<div class="card">
  <h1><span>Nudgarr</span></h1>
  <p class="sub">Sign in to continue</p>
  <div class="err" id="err"></div>
  <label>Username</label>
  <input type="text" id="usr" autocomplete="username" autofocus/>
  <label>Password</label>
  <input type="password" id="pwd" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
  <button id="btn" onclick="login()">Sign In</button>
</div>
<script>
let _countdown = null;

function startCountdown(seconds) {
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.disabled = true;
  if (_countdown) clearInterval(_countdown);
  let remaining = seconds;
  function tick() {
    if (remaining <= 0) {
      clearInterval(_countdown);
      btn.disabled = false;
      btn.textContent = 'Sign In';
      err.textContent = 'You may try again.';
      return;
    }
    btn.textContent = `Try again in ${remaining}s`;
    remaining--;
  }
  tick();
  _countdown = setInterval(tick, 1000);
}

async function login() {
  const r = await fetch('/api/auth/login', {method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username: document.getElementById('usr').value, password: document.getElementById('pwd').value})
  });
  if (r.ok) { window.location.href = '/'; }
  else {
    const d = await r.json();
    const err = document.getElementById('err');
    err.textContent = d.error || 'Invalid username or password.';
    err.classList.add('show');
    // Parse seconds from lockout message and start countdown
    const match = d.error && d.error.match(/Try again in (\d+)s/);
    if (match) {
      err.textContent = 'Too many failed attempts.';
      startCountdown(parseInt(match[1]));
    }
  }
}
</script>
</body>
</html>
