<!-- ══════════════════════════════ SWEEP ══════════════════════════════ -->
  <div class="section" id="tab-sweep">
    <div class="sweep-grid">

      <!-- ══ ROW 1: Pipeline cards — each is a direct sweep-grid cell ══ -->
      <div id="sweepPipelineCutoff" class="card">
        <p class="help" style="margin:4px 0">Loading&hellip;</p>
      </div>
      <div id="sweepPipelineBacklog" class="card">
        <p class="help" style="margin:4px 0">Loading&hellip;</p>
      </div>
      <div id="sweepPipelineCfScore" class="card">
        <p class="help" style="margin:4px 0">Loading&hellip;</p>
      </div>

      <!-- ══ ROW 2: Summary cards ══ -->
      <div id="sweepHealthCard" class="card">
        <p class="help" style="margin:4px 0">Loading&hellip;</p>
      </div>

      <div class="card">
        <span class="sum-title">Imports Confirmed</span>
        <div id="sweepImportsCard">
          <p class="help" style="margin:4px 0">Loading&hellip;</p>
        </div>
      </div>

      <div class="card">
        <span class="sum-title">Last Sweep</span>
        <div class="last-sweep-cols">
          <div>
            <div class="stat-lbl">Completed</div>
            <div class="ls-val normal" id="sweepLastCompletedVal">&mdash;</div>
            <div class="ls-sub" id="sweepLastCompletedSub">&nbsp;</div>
          </div>
          <div>
            <div class="stat-lbl">Next Run</div>
            <div class="ls-val ok" id="sweepNextRunVal">&mdash;</div>
            <div class="ls-sub" id="sweepNextRunSub">&nbsp;</div>
          </div>
        </div>
      </div>

      <!-- ══ ROW 3: Feed ══ -->
      <div class="card sweep-feed-card">
        <div class="feed-hdr">
          <span class="sum-title" style="margin-bottom:0">Searched This Sweep</span>
          <div class="feed-controls">
            <label>Per page</label>
            <select id="sweepFeedLimit" onchange="syncPageSize('sweep');loadSweepFeed(0)">
              <option value="10" selected>10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>
        <div class="feed-table-wrap">
        <table class="feed-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Instance</th>
              <th>Time</th>
              <th class="r">Pipeline</th>
            </tr>
          </thead>
          <tbody id="sweepFeedBody">
            <tr><td colspan="4" style="text-align:center;color:var(--muted);padding:16px 0;font-size:12px">No sweep has run yet.</td></tr>
          </tbody>
        </table>
        </div>
        <div class="feed-pagination">
          <span class="page-info" id="sweepFeedPageInfo"></span>
          <div class="page-btns">
            <button class="btn sm" id="sweepFeedPrevBtn" onclick="prevSweepFeed()" disabled>Prev</button>
            <button class="btn sm" id="sweepFeedNextBtn" onclick="nextSweepFeed()" disabled>Next</button>
          </div>
          <div class="page-jump-wrap">
            <span>Go to page</span>
            <input type="number" min="1" value="1" id="sweepFeedGoInput"/>
            <button class="btn sm" onclick="goToSweepFeedPage()">Go</button>
          </div>
        </div>
      </div>

    </div>
  </div>
